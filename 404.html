<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Halaman Tidak Ditemukan</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
            color: #2d3436;
        }

        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
            background: #fff;
            padding: 40px 24px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .error-code {
            font-size: 5rem;
            font-weight: 900;
            margin: 0;
            color: #dfe6e9;
            line-height: 1;
        }

        .icon-box {
            background: #fff5f5;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: -40px auto 20px;
            color: #ff7675;
            box-shadow: 0 4px 10px rgba(255, 118, 117, 0.2);
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            font-weight: 800;
        }

        p {
            font-size: 1rem;
            color: #636e72;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: #00b894;
            color: white;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-home:hover {
            background-color: #00a383;
        }

        .btn-home:active {
            transform: scale(0.95);
        }

        i {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon-box">
        <i data-lucide="map-pin-off"></i>
    </div>
    <h1 class="error-code">404</h1>
    <h1>Waduh, Nyasar Ya?</h1>
    <p>Halaman yang Anda cari tidak ada atau mungkin sudah pindah ke tempat lain.</p>
    
    <a href="index.html" class="btn-home">
        <i data-lucide="home"></i>
        Kembali ke Beranda
    </a>
</div>

<script>
    // Inisialisasi icon Lucide
    lucide.createIcons();
</script>

</body>
</html>
