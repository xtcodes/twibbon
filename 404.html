<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 - Halaman Tidak Ditemukan</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f0f2f5; 
            margin: 0; 
            padding: 20px;
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Samakan dengan Wrapper index.html */
        .wrapper { 
            width: 100%; 
            max-width: 480px; 
        }

        /* Samakan dengan Card #app di index.html */
        .card {
            background: #fff; 
            padding: 40px 24px; 
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            text-align: center;
        }

        /* Icon dibuat besar dan berwarna lembut */
        .icon-container {
            background: #fff5f5;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px auto;
            color: #ff7675;
        }

        /* Memastikan ukuran icon Lucide besar (48px) */
        .icon-container svg {
            width: 48px;
            height: 48px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 900;
            color: #2d3436;
            margin: 0 0 10px 0;
        }

        .error-code {
            font-size: 1rem;
            font-weight: 700;
            color: #b2bec3;
            letter-spacing: 2px;
            margin-bottom: 20px;
            display: block;
        }

        p {
            font-size: 1rem;
            color: #636e72;
            line-height: 1.6;
            margin: 0 0 32px 0;
        }

        /* Gaya tombol disamakan dengan btn-download */
        .btn-back {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: #00b894;
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            transition: transform 0.1s;
        }

        .btn-back:active {
            transform: scale(0.98);
        }

        .btn-back i {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="card">
        <div class="icon-container">
            <!-- Menggunakan icon search agar lebih relevan dengan 'mencari' halaman -->
            <i data-lucide="search-x"></i>
        </div>
        
        <span class="error-code">ERROR 404</span>
        <h1>Waduh, Nyasar Ya?</h1>
        <p>Halaman yang Anda cari tidak ditemukan atau mungkin sudah pindah alamat.</p>
        
        <a href="index.html" class="btn-back">
            <i data-lucide="home"></i>
            Kembali ke Beranda
        </a>
    </div>
</div>

<script>
    // Inisialisasi icon Lucide
    lucide.createIcons();
</script>

</body>
</html>
