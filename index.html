<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twibbon Generator Pro</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #2ecc71;
            --danger: #e74c3c;
            --bg: #f0f2f5;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px; /* Biar gak rapat layar di HP */
            box-sizing: border-box;
        }

        #app {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 450px; /* Ukuran pas untuk widget */
        }

        /* DROP AREA 1:1 */
        .drop-area {
            width: 100%;
            aspect-ratio: 1 / 1; /* Kotak Sempurna */
            border: 2px dashed #ccc;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
            margin-bottom: 20px;
            overflow: hidden;
            position: relative;
        }

        .drop-area.active {
            border-color: var(--primary);
            background: rgba(74, 144, 226, 0.05);
        }

        .drop-area:hover {
            border-color: #999;
        }

        .drop-area p {
            font-size: 0.9rem;
            color: #777;
            margin: 10px 20px;
        }

        /* Icon sederhana */
        .upload-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        /* Output Image & Canvas */
        #app img, #app canvas {
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 12px;
            display: block;
            margin-bottom: 20px;
        }

        /* Button Styling */
        .button-group {
            display: flex;
            gap: 12px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active { transform: scale(0.98); }

        .btn-download { background: var(--success); color: white; }
        .btn-reset { background: #eee; color: #444; }

        input[type="file"] { display: none; } /* Sembunyikan input asli */

        .status-msg {
            font-size: 0.85rem;
            margin-bottom: 15px;
            color: #555;
        }
    </style>
</head>
<body>
    <div id="app">
        </div>
    <script src="src/js/index.js"></script>
    <script src="src/js/app.js"></script>
</body>
	</html>
