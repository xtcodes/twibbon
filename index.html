<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twibbon Generator</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f0f2f5; margin: 0; padding: 15px;
            display: flex; justify-content: center; box-sizing: border-box;
        }

        .wrapper { width: 100%; max-width: 440px; }
        
        .header-identity { text-align: center; margin-bottom: 15px; min-height: 60px; }
        .header-identity h1 { font-size: 1.5rem; font-weight: 800; color: #2d3436; margin: 0; }
        .header-identity p { font-size: 0.9rem; color: #636e72; margin: 5px 0 0 0; }

        #app {
            background: #fff; padding: 15px; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; margin-bottom: 20px;
        }
        
        /* LOCK 1:1 ASPECT RATIO SEJAK AWAL */
        .drop-area-square {
            width: 100%;
            aspect-ratio: 1 / 1; /* Standar Browser Modern */
            background: #fafafa;
            border: 2px dashed #d1d8e0;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Fallback untuk browser yang tidak support aspect-ratio */
        @supports not (aspect-ratio: 1/1) {
            .drop-area-square {
                padding-top: 100%;
                height: 0;
            }
            .status-overlay {
                position: absolute; top: 0; left: 0; right: 0; bottom: 0;
                justify-content: center;
            }
        }
        
        .drop-area-square.no-border { border: none !important; background: #000; }
        
        .status-overlay { 
            display: flex; flex-direction: column; align-items: center; 
            color: #888; pointer-events: none; width: 100%;
        }
        .status-overlay i { width: 44px; height: 44px; margin-bottom: 8px; color: #b2bec3; }
        .status-overlay span { font-size: 0.9rem; font-weight: 500; padding: 0 10px; }
        
        canvas { width: 100% !important; height: 100% !important; display: block; }

        .btn-group { display: none; gap: 10px; margin-top: 15px; }
        button {
            flex: 1; padding: 14px; border: none; border-radius: 10px;
            font-size: 14px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-download { background: #00b894; color: white; }
        .btn-reset { background: #f1f2f6; color: #2d3436; }

        .article-section { 
            text-align: left; line-height: 1.6; color: #2d3436; 
            background: #fff; padding: 20px; border-radius: 15px; 
        }

        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* Fade In Effect */
        .fade-in { animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="header-identity">
        <h1 id="title-text"></h1>
        <p id="subtitle-text"></p>
    </div>

    <div id="app">
        <!-- DROP AREA STANDBY DISINI (TIDAK AKAN MELIPAT) -->
        <div id="drop-zone" class="drop-area-square">
            <div class="status-overlay" id="status-content">
                <i data-lucide="image-plus"></i>
                <span id="status-text">Memuat sistem...</span>
            </div>
        </div>
        
        <input type="file" id="file-input" accept="image/*" style="display: none;">
        
        <div class="btn-group" id="ui-group">
            <!-- Tombol disisipkan via JS -->
        </div>
    </div>

    <div class="article-section">
        <h2>Instruksi</h2>
        <ul>
            <li>Klik kotak untuk unggah foto.</li>
            <li>Geser/Cubit foto untuk mengatur posisi.</li>
            <li>Klik Unduh jika sudah selesai.</li>
        </ul>
    </div>
</div>

<script src="src/js/index.js"></script>
<script src="src/js/app.js"></script>
</body>
</html>
