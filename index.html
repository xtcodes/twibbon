<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twibbon Generator Pro</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #2ecc71;
            --bg: #f0f2f5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Container utama ngikutin layar tapi gak bakal luber */
        .main-wrapper {
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #app {
            background: white;
            width: 100%;
            /* Desktop dapet ukuran ideal, Mobile dapet 100% */
            max-width: 600px; 
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            box-sizing: border-box;
            text-align: center;
        }

        /* DROP AREA & CANVAS HARUS SAMA PERSIS 1:1 */
        .canvas-container {
            width: 100%;
            aspect-ratio: 1 / 1; /* Paksa Kotak */
            position: relative;
            background: #fafafa;
            border: 3px dashed #ddd;
            border-radius: 15px;
            margin-bottom: 20px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        /* Bikin Canvas dan Img Hasil manut sama Container-nya */
        canvas, .result-preview {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain;
            display: block;
        }

        .status-text {
            font-weight: bold;
            color: #555;
            margin-bottom: 15px;
        }

        /* Tombol Berdampingan */
        .button-group {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-download { background: var(--success); color: white; }
        .btn-reset { background: #eee; color: #333; }

        /* ARTIKEL DI BAWAH */
        .article {
            width: 100%;
            max-width: 600px;
            margin-top: 30px;
            padding: 20px;
            box-sizing: border-box;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div id="app">
        </div>

    <div class="article">
        <h2>Tentang Twibbon Generator</h2>
        <p>Aplikasi ini memungkinkan Anda membuat foto profil dengan bingkai (twibbon) secara instan. Hasil gambar diproses langsung di perangkat Anda untuk menjaga privasi.</p>
    </div>
</div>

<script src="src/js/index.js"></script>
<script src="src/js/app.js"></script>
</body>
</html>
