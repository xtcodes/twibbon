<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twibbon Generator</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f0f2f5; margin: 0; padding: 15px;
            display: flex; justify-content: center; overflow-x: hidden;
        }

        .wrapper { width: 100%; max-width: 440px; }
        
        .header-identity { text-align: center; margin-bottom: 15px; }
        .header-identity h1 { font-size: 1.5rem; font-weight: 800; color: #2d3436; margin: 0; }
        .header-identity p { font-size: 0.9rem; color: #636e72; margin: 5px 0 0 0; }

        #app {
            background: #fff; padding: 15px; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; margin-bottom: 20px;
        }

        /* KUNCI UTAMA: Kotak sejak awal di CSS */
        .drop-area-square {
            width: 100%;
            aspect-ratio: 1 / 1; 
            background: #fafafa;
            border: 2px dashed #d1d8e0;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            touch-action: none; /* Mencegah geser layar saat zoom gambar */
        }
        
        .drop-area-square.no-border { border: none !important; background: #000; }
        
        canvas { 
            width: 100% !important; 
            height: 100% !important; 
            display: block; 
            touch-action: none;
        }

        .status-overlay { 
            display: flex; flex-direction: column; align-items: center; 
            color: #888; pointer-events: none; 
        }
        .status-overlay i { width: 44px; height: 44px; margin-bottom: 8px; color: #b2bec3; }

        .btn-group { display: none; gap: 10px; margin-top: 15px; }
        button {
            flex: 1; padding: 14px; border: none; border-radius: 10px;
            font-size: 14px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-download { background: #00b894; color: white; }
        .btn-reset { background: #f1f2f6; color: #2d3436; }

        .article-section { 
            text-align: left; line-height: 1.6; color: #2d3436; 
            background: #fff; padding: 20px; border-radius: 15px; 
        }

        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="header-identity">
        <h1 id="title-text">Loading...</h1>
        <p id="subtitle-text">Harap tunggu</p>
    </div>

    <div id="app">
        <!-- Area drop sudah ada di HTML, tidak akan berubah bentuk -->
        <div id="drop-zone" class="drop-area-square">
            <div id="status-container" class="status-overlay">
                <i data-lucide="image-plus"></i>
                <span id="status-text">Klik untuk Unggah Foto</span>
            </div>
        </div>

        <input type="file" id="file-input" accept="image/*" style="display: none;">

        <div id="ui-group" class="btn-group">
            <button id="btn-dl" class="btn-download">
                <i data-lucide="download"></i> <span id="text-dl">Unduh</span>
            </button>
            <button id="btn-re" class="btn-reset">
                <i data-lucide="refresh-cw"></i> <span id="text-re">Ganti Foto</span>
            </button>
        </div>
    </div>

    <div class="article-section">
        <h2>Instruksi</h2>
        <ul>
            <li>Klik kotak untuk unggah foto.</li>
            <li>Geser dengan 1 jari untuk mengatur posisi.</li>
            <li>Cubit (Pinch) untuk memperbesar/kecil.</li>
            <li>Klik Unduh jika sudah selesai.</li>
        </ul>
    </div>
</div>

<script src="src/js/index.js"></script>
<script src="src/js/app.js"></script>
</body>
</html>
