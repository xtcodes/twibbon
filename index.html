<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twibbon Generator</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            box-sizing: border-box;
        }

        .wrapper { width: 100%; max-width: 480px; }

        #app {
            background: #ffffff;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }

        .header-title { font-size: 1.25rem; font-weight: 800; color: #2d3436; margin: 0 0 4px 0; }
        .header-sub { font-size: 0.95rem; color: #636e72; margin: 0 0 20px 0; }

        .drop-area-square {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #fafafa;
            border: 2px dashed #d1d8e0;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            position: relative;
            margin-bottom: 20px;
        }

        .status-overlay {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #888;
            padding: 20px;
            z-index: 10;
        }

        .status-overlay i { width: 52px; height: 52px; margin-bottom: 12px; stroke-width: 1.5; }
        .status-overlay span { font-size: 1rem; font-weight: 600; line-height: 1.4; }

        /* CSS Animation - Pake transform biar smooth */
        .spinning { 
            animation: spin 1s linear infinite; 
            color: #4a90e2; 
            display: inline-block;
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); } 
        }

        .preview-img { width: 100%; height: 100%; object-fit: contain; }

        .btn-group { display: flex; gap: 12px; width: 100%; }
        button {
            flex: 1; padding: 14px; border: none; border-radius: 10px;
            font-size: 14px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-download { background: #00b894; color: white; }
        .btn-reset { background: #f1f2f6; color: #2d3436; }

        @media (max-width: 480px) { body { padding: 15px; } #app { padding: 20px; } }
    </style>
</head>
<body>
<div class="wrapper">
    <div id="app">
        <h1 class="header-title">Twibbon Generator</h1>
        <p class="header-sub" id="sub-msg">Silakan pilih foto profil</p>
        <div id="dynamic-content"></div>
    </div>
</div>
<script src="src/js/index.js"></script>
<script src="src/js/app.js"></script>
</body>
</html>
